<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>puuoo — App Policies</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #fafafa;
            color: #444;
            line-height: 1.7;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 480px;
            width: 100%;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.07);
            padding: 48px 40px;
            text-align: center;
        }
        h1 { color: #333; font-size: 22px; margin-bottom: 8px; }
        .subtitle { color: #999; font-size: 14px; margin-bottom: 32px; }
        .app-list { list-style: none; padding: 0; }
        .app-list li { margin-bottom: 12px; }
        .app-list a {
            display: block;
            padding: 14px 20px;
            background: #fdf2f6;
            border: 1px solid #f5dce5;
            border-radius: 8px;
            color: #880D1E;
            font-weight: 500;
            font-size: 15px;
            text-decoration: none;
            transition: background 0.2s, border-color 0.2s;
        }
        .app-list a:hover {
            background: #fce4ed;
            border-color: #F49CBB;
        }
        .footer {
            margin-top: 32px;
            color: #ccc;
            font-size: 12px;
        }
        @media (max-width: 500px) {
            .container { padding: 32px 18px; border-radius: 0; box-shadow: none; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>App Policies</h1>
        <p class="subtitle">Legal documents for our apps</p>
        <ul class="app-list">
            <li><a href="loverscratch/">Lover's Scratch — Privacy Policy</a></li>
        </ul>
        <div class="footer">&copy; 2026 puuoo</div>
    </div>
</body>
</html>
