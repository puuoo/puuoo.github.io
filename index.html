<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>puuoo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Gaegu', cursive;
            padding: 20px;
        }
        .logo {
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
            position: relative;
        }
        .wordmark-row {
            display: flex;
            align-items: baseline;
            position: relative;
        }
        .puu {
            font-size: 120px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 6px;
            line-height: 1;
        }
        .eyes-block {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .arch {
            margin-bottom: -14px;
        }
        .oo {
            font-size: 120px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 6px;
            line-height: 1;
        }
        .smile {
            margin-top: -12px;
        }
        .links {
            margin-top: 48px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .links a {
            color: #666;
            font-size: 18px;
            text-decoration: none;
            transition: color 0.2s;
        }
        .links a:hover {
            color: #fff;
        }
        .email {
            margin-top: 32px;
            color: #444;
            font-size: 16px;
        }
        .email a {
            color: #444;
            text-decoration: none;
            transition: color 0.2s;
        }
        .email a:hover {
            color: #fff;
        }
        @media (max-width: 480px) {
            .puu, .oo { font-size: 72px; letter-spacing: 4px; }
            .arch svg { width: 64px; height: 18px; }
            .smile svg { width: 40px; height: 14px; }
            .arch { margin-bottom: -10px; }
            .smile { margin-top: -8px; }
            .links a { font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="logo">
        <div class="wordmark-row">
            <span class="puu">puu</span>
            <div class="eyes-block">
                <div class="arch">
                    <svg width="90" height="24" viewBox="0 0 90 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M8 22 C8 6, 82 6, 82 22" stroke="#fff" stroke-width="3" stroke-linecap="round" fill="none"/>
                    </svg>
                </div>
                <span class="oo">oo</span>
                <div class="smile">
                    <svg width="56" height="20" viewBox="0 0 56 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M8 4 C14 18, 42 18, 48 4" stroke="#fff" stroke-width="3" stroke-linecap="round" fill="none"/>
                    </svg>
                </div>
            </div>
        </div>
    </div>
    <div class="links">
        <a href="loverscratch/">Privacy Policy</a>
    </div>
    <div class="email">
        <a href="mailto:puuooapps@gmail.com">puuooapps@gmail.com</a>
    </div>
</body>
</html>
