<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>puuoo</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo {
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
        }
        .arch {
            margin-bottom: -6px;
        }
        .wordmark {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            font-size: 72px;
            font-weight: 300;
            letter-spacing: 6px;
            color: #fff;
        }
        .smile {
            margin-top: -4px;
        }
        @media (max-width: 480px) {
            .wordmark { font-size: 48px; letter-spacing: 4px; }
            .arch svg { width: 52px; height: 16px; }
            .smile svg { width: 36px; height: 14px; }
        }
    </style>
</head>
<body>
    <div class="logo">
        <div class="arch">
            <svg width="72" height="22" viewBox="0 0 72 22" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M8 20 C8 8, 64 8, 64 20" stroke="#fff" stroke-width="2.5" stroke-linecap="round" fill="none"/>
            </svg>
        </div>
        <div class="wordmark">puuoo</div>
        <div class="smile">
            <svg width="48" height="18" viewBox="0 0 48 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M8 4 C12 16, 36 16, 40 4" stroke="#fff" stroke-width="2.5" stroke-linecap="round" fill="none"/>
            </svg>
        </div>
    </div>
</body>
</html>
